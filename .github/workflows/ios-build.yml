# AltStoreサイドロード用の未署名IPAをビルドするワークフロー
#
# - mainへのpush / 手動実行（workflow_dispatch）でビルドし、Artifactsにアップロード
# - v* タグのpushではGitHub Releaseを作成してIPAを添付
#
# 生成された BrigeTTS-Nepali-unsigned.ipa は署名されていないため、
# AltStore / SideStore で各自のApple IDにより署名してインストールする。
name: Build iOS App (unsigned IPA)

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-ipa:
    # XcodeGen 2.45+はXcode 16形式（objectVersion 77）のプロジェクトを生成するため、
    # Xcode 16系がデフォルトのmacos-15ランナーを使用する
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare web assets and app icon
        run: bash ios/scripts/prepare-www.sh

      - name: Inject error report token
        env:
          ERROR_REPORT_TOKEN: ${{ secrets.ERROR_REPORT_TOKEN }}
        run: |
          if [ -n "$ERROR_REPORT_TOKEN" ]; then
            B64=$(printf '%s' "$ERROR_REPORT_TOKEN" | base64)
            {
              echo "// CIビルドで自動生成（Issues作成権限のみの専用トークン）"
              echo "window.__ERROR_REPORT_CONFIG__ = { t: '$B64' };"
            } > ios/App/www/error-report-config.js
            echo "エラーレポートトークンを埋め込みました"
          else
            echo "ERROR_REPORT_TOKEN未設定: GitHub Issue下書きフォールバックを使用します"
          fi

      - name: Generate Xcode project
        run: xcodegen generate --spec ios/project.yml --project ios

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project ios/BridgeTTS.xcodeproj \
            -scheme BridgeTTS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          mkdir -p ios/build/Payload
          cp -R "ios/build/Build/Products/Release-iphoneos/BrigeTTSNepali.app" ios/build/Payload/
          cd ios/build
          zip -qry BrigeTTS-Nepali-unsigned.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrigeTTS-Nepali-unsigned-ipa
          path: ios/build/BrigeTTS-Nepali-unsigned.ipa
          retention-days: 90

      - name: Attach IPA to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ios/build/BrigeTTS-Nepali-unsigned.ipa
          generate_release_notes: true
