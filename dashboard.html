<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BridgeTTS プロジェクトダッシュボード</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 18px; font-family: -apple-system, "Hiragino Sans", sans-serif;
         background: #f4f6f9; color: #1f2937; line-height: 1.55; }
  header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  h1 { font-size: 19px; margin: 0; }
  #updated { font-size: 12px; color: #6b7280; }
  #refreshBtn { margin-left: auto; background: #4292CD; color: #fff; border: none; border-radius: 8px;
                padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .links { font-size: 12px; margin-bottom: 14px; color: #6b7280; }
  .links a { color: #2563eb; text-decoration: none; margin-right: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px 16px;
          box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .card h2 { font-size: 14px; margin: 0 0 8px; color: #111827; }
  ul { list-style: none; margin: 0; padding: 0; font-size: 13px; }
  li { padding: 6px 0; border-bottom: 1px solid #f1f3f6; }
  li:last-child { border-bottom: none; }
  .sub { color: #6b7280; font-size: 12px; }
  .mono { font-family: ui-monospace, monospace; font-size: 12px; color: #6b7280; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .ok { color: #15803d; font-weight: 700; }
  .warn { background: #fef3c7; border: 1px solid #f59e0b; color: #92400e;
          border-radius: 8px; padding: 8px 10px; font-size: 13px; margin-top: 8px; }
  .good { background: #ecfdf5; border: 1px solid #34d399; color: #065f46;
          border-radius: 8px; padding: 8px 10px; font-size: 13px; margin-top: 8px; }
  .pill { display: inline-block; border-radius: 999px; padding: 1px 9px; font-size: 11px; font-weight: 700; }
  .pill.success { background: #dcfce7; color: #15803d; }
  .pill.failure { background: #fee2e2; color: #b91c1c; }
  .pill.progress { background: #dbeafe; color: #1d4ed8; }
  .muted { color: #9ca3af; font-size: 13px; padding: 8px 0; }
  .err { color: #b91c1c; font-size: 12px; }
  pre { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px;
        font-size: 12px; white-space: pre-wrap; margin: 6px 0 0; max-height: 300px; overflow-y: auto; }
  footer { margin-top: 14px; font-size: 11px; color: #9ca3af; }
</style>
</head>
<body>
<header>
  <h1>🌉 BridgeTTS プロジェクトダッシュボード</h1>
  <span id="updated"></span>
  <button id="refreshBtn">🔄 更新</button>
</header>
<div class="links">
  <a href="https://github.com/AichiroFunakoshi/Bridge-TTS-Codex-" target="_blank">リポジトリ</a>
  <a href="https://github.com/AichiroFunakoshi/Bridge-TTS-Codex-/actions" target="_blank">Actions</a>
  <a href="https://github.com/AichiroFunakoshi/Bridge-TTS-Codex-/releases" target="_blank">Releases</a>
  <a href="./index.html" target="_blank">PWA本体</a>
  <a href="./altstore.html" target="_blank">AltStoreソース</a>
</div>

<div class="grid">
  <section class="card" style="grid-column: 1 / -1;">
    <h2>🚦 リリース / 配信状況</h2>
    <div id="releaseBody" class="muted">読み込み中…</div>
  </section>
  <section class="card"><h2>📝 未リリースの変更（CHANGELOG [Unreleased]）</h2><div id="unreleasedBody" class="muted">読み込み中…</div></section>
  <section class="card"><h2>🕘 直近のコミット（main）</h2><div id="commitsBody" class="muted">読み込み中…</div></section>
  <section class="card"><h2>🐛 オープンなIssue / PR</h2><div id="issuesBody" class="muted">読み込み中…</div></section>
  <section class="card"><h2>⚙️ CI（直近のワークフロー実行）</h2><div id="ciBody" class="muted">読み込み中…</div></section>
</div>
<footer>データはGitHub API（未認証・60回/時の制限あり）から取得。ページ再読み込みまたは「更新」で最新化。</footer>

<script>
const REPO = 'AichiroFunakoshi/Bridge-TTS-Codex-';
const API = 'https://api.github.com/repos/' + REPO;
const RAW = 'https://raw.githubusercontent.com/' + REPO + '/main';

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
async function getJSON(url) {
  const r = await fetch(url, { headers: { 'Accept': 'application/vnd.github+json' } });
  if (r.status === 403) throw new Error('APIレート制限に達しました。しばらく待って再読み込みしてください。');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
function jd(iso) {
  return new Date(iso).toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function fail(id, e) { document.getElementById(id).innerHTML = '<div class="err">取得失敗: ' + esc(e.message) + '</div>'; }

async function loadRelease() {
  try {
    const [releases, yml] = await Promise.all([
      getJSON(API + '/releases?per_page=1'),
      fetch(RAW + '/ios/project.yml').then(r => r.text())
    ]);
    const latest = releases[0];
    const mv = (yml.match(/MARKETING_VERSION:\s*"([^"]+)"/) || [])[1] || '?';
    let appsVer = '?';
    try {
      const apps = await fetch('./apps.json').then(r => r.json());
      appsVer = apps.apps[0].versions[0].version;
    } catch (e) {}
    const relTag = latest ? latest.tag_name : 'なし';
    let html = '<ul>' +
      '<li>最新リリース: <a href="' + esc(latest ? latest.html_url : '#') + '" target="_blank"><b>' + esc(relTag) + '</b></a>' +
      (latest ? ' <span class="sub">(' + jd(latest.published_at) + ')</span>' : '') + '</li>' +
      '<li>main上の版数 (MARKETING_VERSION): <b>v' + esc(mv) + '</b></li>' +
      '<li>AltStore配信中の最新: <b>v' + esc(appsVer) + '</b></li></ul>';
    if (latest && ('v' + mv) !== relTag) {
      html += '<div class="warn">⚠️ mainは v' + esc(mv) + ' 相当ですがタグ未push（リリース未発行）。配信は ' + esc(relTag) + ' 止まりです。<span class="mono">git tag v' + esc(mv) + ' && git push origin v' + esc(mv) + '</span> でリリースされます。</div>';
    } else {
      html += '<div class="good">✅ main・リリース・AltStore配信の版数は一致しています。</div>';
    }
    document.getElementById('releaseBody').innerHTML = html;
  } catch (e) { fail('releaseBody', e); }
}

async function loadUnreleased() {
  try {
    const md = await fetch(RAW + '/CHANGELOG.md').then(r => r.text());
    const m = md.match(/## \[Unreleased\]([\s\S]*?)(?=\n## \[)/);
    const body = m ? m[1].trim() : '';
    document.getElementById('unreleasedBody').innerHTML = body
      ? '<pre>' + esc(body) + '</pre>'
      : '<div class="muted">未リリースの変更はありません（すべてリリース済み）。</div>';
  } catch (e) { fail('unreleasedBody', e); }
}

async function loadCommits() {
  try {
    const commits = await getJSON(API + '/commits?per_page=8');
    document.getElementById('commitsBody').innerHTML = '<ul>' + commits.map(c =>
      '<li><a href="' + esc(c.html_url) + '" target="_blank">' + esc(c.commit.message.split('\n')[0].slice(0, 72)) + '</a>' +
      '<div class="sub"><span class="mono">' + c.sha.slice(0, 7) + '</span> ・ ' + jd(c.commit.committer.date) + '</div></li>'
    ).join('') + '</ul>';
  } catch (e) { fail('commitsBody', e); }
}

async function loadIssues() {
  try {
    const items = await getJSON(API + '/issues?state=open&per_page=20');
    const issues = items.filter(i => !i.pull_request);
    const prs = items.filter(i => i.pull_request);
    let html = '';
    if (!issues.length && !prs.length) {
      html = '<div class="muted">オープンなIssue・PRはありません 🎉</div>';
    } else {
      html = '<ul>' + [...prs, ...issues].map(i => {
        const kind = i.pull_request ? 'PR' : 'Issue';
        const labels = (i.labels || []).map(l => esc(l.name)).join(', ');
        return '<li>[' + kind + ' #' + i.number + '] <a href="' + esc(i.html_url) + '" target="_blank">' + esc(i.title) + '</a>' +
          '<div class="sub">' + jd(i.created_at) + (labels ? ' ・ ' + labels : '') + '</div></li>';
      }).join('') + '</ul>';
    }
    document.getElementById('issuesBody').innerHTML = html;
  } catch (e) { fail('issuesBody', e); }
}

async function loadCI() {
  try {
    const data = await getJSON(API + '/actions/runs?per_page=6');
    const runs = data.workflow_runs || [];
    document.getElementById('ciBody').innerHTML = runs.length ? '<ul>' + runs.map(r => {
      const st = r.conclusion || r.status;
      const cls = st === 'success' ? 'success' : (st === 'failure' ? 'failure' : 'progress');
      return '<li><span class="pill ' + cls + '">' + esc(st) + '</span> ' +
        '<a href="' + esc(r.html_url) + '" target="_blank">' + esc(r.name) + '</a>' +
        '<div class="sub">' + esc((r.display_title || '').slice(0, 60)) + ' ・ ' + jd(r.created_at) + '</div></li>';
    }).join('') + '</ul>' : '<div class="muted">実行履歴なし</div>';
  } catch (e) { fail('ciBody', e); }
}

function loadAll() {
  document.getElementById('updated').textContent =
    '更新: ' + new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
  loadRelease(); loadUnreleased(); loadCommits(); loadIssues(); loadCI();
}
document.getElementById('refreshBtn').addEventListener('click', loadAll);
loadAll();
</script>
</body>
</html>
